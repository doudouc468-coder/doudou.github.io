 solid #24303a;position:relative;background:#0d141a;cursor:pointer;transition:.26s ease}.home-role-card:hover{transform:translateY(-3px);border-color:#8f413b;box-shadow:0 14px 28px rgba(0,0,0,.28)}.home-role-card.active{border-color:#d34438;box-shadow:0 0 0 1px rgba(211,68,56,.52),0 0 24px rgba(211,68,56,.16)}.home-role-card img,.home-role-card video{width:100%;height:100%;object-fit:cover;display:block}.home-role-card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,8,11,.04),rgba(5,8,11,.16) 48%,rgba(5,8,11,.92) 100%)}.home-role-card .caption{position:absolute;left:10px;right:10px;bottom:10px;z-index:2}.home-role-card .caption b{display:block;font-size:12px}.home-role-card .caption span{display:block;margin-top:4px;font-size:10px;color:#97a4ae;letter-spacing:.12em}.home-side-stack{display:grid;grid-template-rows:1fr auto;gap:14px;min-height:0}.home-profile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}.home-profile-grid .mini-spec{background:rgba(13,19,24,.68)}.home-story{margin-top:14px;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.07);background:rgba(9,13,17,.46);color:#c5d0d8;font-size:13px;line-height:1.85}.archive-topline{display:flex;align-items:center;justify-content:space-between;gap:14px}.archive-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.archive-metric{min-width:118px;padding:12px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg,rgba(11,17,22,.72),rgba(9,13,17,.4))}.archive-metric .k{font-size:10px;color:#85939d;letter-spacing:.18em;text-transform:uppercase}.archive-metric .v{margin-top:8px;font-size:18px;font-weight:700}.archive-column .glow{position:absolute;inset:auto 0 0 0;height:32%;background:linear-gradient(180deg,transparent,rgba(230,69,58,.08));opacity:0;transition:.28s ease;z-index:1}.archive-column:hover .glow,.archive-column.active .glow{opacity:1}.archive-column .status-line{display   <script>
    const CREATURES=[{id:'01',key:'xuanming',name:'玄冥女皇',en:'XUANMING QUEEN',code:'SHJX-0521',type:'机械异兽',origin:'北海玄冥',danger:9,status:'已解锁',thumb:'./shan-hai-ui/public/assets/xuanming.png',focus:'60%',desc:'北海寒域数据核心已完成建模。主视觉适合作为首页展示，强调冷冽、危险、安静压迫感。',tags:['冰海神话','机械母体','深海意志']},{id:'02',key:'taotie',name:'饕餮',en:'TAOTIE',code:'SHJX-0519',type:'吞噬异兽',origin:'极渊废土',danger:8,status:'数据接入',thumb:'./shan-hai-ui/public/assets/creatures/02-taotie.webp',focus:'74%',desc:'高能吞噬结构，以压迫式镜头和暗部金属纹理见长，适合做强攻击性展示。',tags:['吞噬核心','废土重甲','威压前景']},{id:'03',key:'zhulong',name:'烛龙',en:'ZHULONG',code:'SHJX-0517',type:'时序异兽',origin:'钟山之巅',danger:7,status:'数据接入',thumb:'./shan-hai-ui/public/assets/creatures/03-zhulong.webp',focus:'50%',desc:'偏时间与感知类异兽，适合做镜头缓推、眼部光源、长线条构图。',tags:['时序光源','长线轮廓','神性凝视']},{id:'04',key:'qiongqi',name:'穷奇',en:'QIONGQI',code:'SHJX-0508',type:'战斗异兽',origin:'西北荒境',danger:8,status:'数据接入',thumb:'./shan-hai-ui/public/assets/creatures/04-qiongqi.webp',focus:'66%',desc:'偏战斗与猎杀感的角色，适合更锋利、更具速度感的动势镜头。',tags:['荒境猎杀','锋刃轮廓','进攻驱动']},{id:'05',key:'hundun',name:'混沌',en:'HUNDUN',code:'SHJX-0492',type:'无相异兽',origin:'幽暗裂隙',danger:10,status:'数据接入',thumb:'./shan-hai-ui/public/assets/creatures/05-hundun.webp',focus:'44%',desc:'无相状态更适合氛围主导，强调雾化、未知、视线被吞没的感觉。',tags:['无相结构','裂隙雾化','未知深渊']},{id:'06',key:'yinglong',name:'应龙',en:'YINGLONG',code:'SHJX-0477',type:'天穹异兽',origin:'昆仑云海',danger:7,status:'数据接入',thumb:'./shan-hai-ui/public/assets/creatures/06-yinglong.webp',focus:'80%',desc:'更偏神性与空域气质，适合做高位视角、冷蓝空间感与秩序感。',tags:['天穹秩序','云海金属','神性高位']}];
    const NAVS=[['home','首页','HOME'],['archive','异兽档案','ARCHIVE'],['generate','视觉生成','GENERATE'],['lab','实验室','LAB'],['favorites','收藏夹','FAVORITES']];
    const SLIDERS=[['形态特征','Morphology',78],['机械融合度','Cybernetic',65],['威胁等级','Threat Level',82],['神秘指数','Mystery',71],['攻击性','Aggressiveness',68],['适应能力','Adaptability',55]];const VISUAL_STYLES=['暗黑科幻','未来机甲','异兽写实','赛博神话','电影质感'];const LIGHT_STYLES=['冷光','暗影','逆光','雾气','红光'];const FILTERS=['#8c8f95','#536171','#2e4256','#6a5b83','#8a4f62','#0f1114','#e6453a'];
    const state={tab:'generate',activeKey:'xuanming',archiveFocus:'xuanming',homeKey:localStorage.getItem('shjx-home-key')||'xuanming',assetKey:null,audioKey:null,styles:new Set(['暗黑科幻']),lights:new Set(['冷光']),filter:'#e6453a',objectUrls:{},audioUrls:{},cloudAssets:{videos:{},audios:{},meta:{}},scan:false,musicMuted:localStorage.getItem('shjx-music-muted')==='1',musicVolume:Number(localStorage.getItem('shjx-music-volume')||'0.46'),musicPlaying:false,currentAudioKey:null};
    function byKey(key){return CREATURES.find(x=>x.key===key)||CREATURES[0]}function activeCreature(){return byKey(state.activeKey)}function homeCreature(){return byKey(state.homeKey)}function archiveCreature(){return byKey(state.archiveFocus||state.activeKey)}function cloudVideoUrl(key){return state.cloudAssets&&state.cloudAssets.videos?state.cloudAssets.videos[key]||'':''}function cloudAudioUrl(key){return state.cloudAssets&&state.cloudAssets.audios?state.cloudAssets.audios[key]||'':''}function mediaUrl(creature){return cloudVideoUrl(creature.key)||state.objectUrls[creature.key]||creature.thumb}function isVideo(creature){return !!(cloudVideoUrl(creature.key)||state.objectUrls[creature.key])}function hasAudioAsset(key){return !!(cloudAudioUrl(key)||state.audioUrls[key])}function assetModeLabel(creature){return cloudVideoUrl(creature.key)?'CLOUD':(state.objectUrls[creature.key]?'LOCAL':'STATIC')}function audioModeLabel(key){return cloudAudioUrl(key)?'CLOUD':(state.audioUrls[key]?'LOCAL':'EMPTY')}function barHtml(level){return '<div class="danger-bars">'+Array.from({length:10},(_,i)=>'<i class="'+(i<level?'on':'')+'"></i>').join('')+'</div>'}function mediaTag(creature,extra=''){const url=mediaUrl(creature);return isVideo(creature)?'<video '+extra+' src="'+url+'" muted playsinline loop preload="metadata"></video>':'<img src="'+url+'" alt="'+creature.name+'" style="object-position:center '+creature.focus+'" />'}function timeString(offset){const d=new Date(Date.now()-offset);const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}
    function renderNav(){document.getElementById('nav').innerHTML=NAVS.map(([key,cn,en])=>'<button class="'+(state.tab===key?'active':'')+'" data-nav="'+key+'"><b>'+cn+'</b><small>'+en+'</small></button>').join('')}function renderCreatureList(){document.getElementById('creatureList').innerHTML=CREATURES.map(creature=>'<div class="creature-card '+(state.activeKey===creature.key?'active':'')+'" data-creature="'+creature.key+'"><div class="creature-thumb">'+mediaTag(creature,'muted playsinline preload="metadata"')+'</div><div><div class="idx">'+creature.id+'</div><div class="name">'+creature.name+'</div><div class="en">'+creature.en+'</div></div></div>').join('')}
    function heroTemplate(creature,mode){const title=mode==='home'?'<div class="hero-en" style="margin-top:-2px;margin-bottom:18px">HOME VISUAL / 可直接替换首页主角视频</div>':'<div class="hero-en">'+creature.en+'</div>';const meta=[['编号',creature.code],['类型',creature.type],['起源',creature.origin],['危险等级',barHtml(creature.danger)],['状态',creature.status]].map(([k,v])=>'<div class="k">'+k+'</div><div class="v">'+v+'</div>').join('');return '<div class="hero"><div class="hero-media">'+mediaTag(creature,'autoplay muted loop playsinline preload="auto"')+'<div class="grain"></div></div><div class="scan '+(state.scan?'active':'')+'"></div><div class="hero-top"><button class="icon-btn" title="全屏">⤢</button><button class="icon-btn" title="查看">◉</button><button class="icon-btn" title="下载">⇣</button></div><div class="hero-body"><div class="hero-info"><h2 class="hero-name">'+creature.name+'</h2>'+title+'<div class="meta">'+meta+'</div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="ghost-btn" data-upload-current="'+creature.key+'">上传当前角色视频</button><button class="ghost-btn" data-set-home="'+creature.key+'">设为首页角色</button></div></div></div></div>'}
    function renderHome(){const creature=homeCreature();const hasAudio=hasAudioAsset(creature.key);document.getElementById('view-home').innerHTML='<div class="home-stage"><div class="hero-media">'+mediaTag(creature,'autoplay muted loop playsinline preload="auto"')+'<div class="grain"></div></div><div class="home-hero-grid"><div class="home-focus-card"><div class="home-focus-top"><div><div class="eyebrow"><i></i>Home Sequence / Main Visual</div><div class="home-title">'+creature.name+'</div><div class="hero-en" style="margin-bottom:8px">'+creature.en+'</div><div class="home-badge"><i></i>已锁定首页主视角</div></div><div class="home-id-box"><b>'+creature.code+'</b><span>'+creature.type+'</span></div></div><div class="home-copy">'+creature.desc+' 这一屏我继续往“片头主视觉”的感觉推了一层：左边是角色主叙事，右边是控制与音乐，下面是六个角色的快速切换轨道。这样后面你继续补素材时，整个系统会更像一个完整作品，而不是单页排版。</div><div class="home-keywords">'+creature.tags.map(tag=>'<span>'+tag+'</span>').join('')+'</div><div class="home-actions"><button class="primary-btn" data-nav-force="archive">进入异兽档案</button><button class="ghost-btn" data-upload-current="'+creature.key+'">替换首页视频</button><button class="ghost-btn" data-set-home="'+creature.key+'">设为首页主角色</button></div><div class="home-signal-row"><div class="home-signal"><div class="k">Origin</div><div class="v">'+creature.origin+'</div></div><div class="home-signal"><div class="k">Danger</div><div class="v">L-'+creature.danger+'</div></div><div class="home-signal"><div class="k">Video</div><div class="v">'+assetModeLabel(creature)+'</div></div><div class="home-signal"><div class="k">Audio</div><div class="v">'+(hasAudio?audioModeLabel(creature.key):'EMPTY')+'</div></div></div><div class="home-role-rail">'+CREATURES.map(c=>'<div class="home-role-card '+(c.key===creature.key?'active':'')+'" data-home-tile="'+c.key+'">'+mediaTag(c,'muted playsinline preload="metadata"')+'<div class="caption"><b>'+c.name+'</b><span>'+c.en+'</span></div></div>').join('')+'</div></div><div class="home-side-stack"><div class="home-panel"><div class="topline"><div><h3>角色总控信息</h3><p>首页不再只是看图，而是会承接角色识别、状态与音乐入口。</p></div><button class="icon-btn" data-nav-force="generate">↗</button></div><div class="home-profile-grid"><div class="mini-spec"><div class="k">Type</div><div class="v">'+creature.type+'</div></div><div class="mini-spec"><div class="k">Status</div><div class="v">'+creature.status+'</div></div><div class="mini-spec"><div class="k">Danger</div><div class="v">'+barHtml(creature.danger)+'</div></div><div class="mini-spec"><div class="k">Archive</div><div class="v">'+creature.id+'</div></div></div><div class="home-story">当前首页会自动继承这个角色的视频和音乐配置。你后面如果想做“进入首页先播放角色短片、再进入档案”的节奏，这一版结构已经能顺着扩。</div></div><div class="home-panel music-wait"><div class="k" style="font-size:11px;color:#87949e;letter-spacing:.18em;text-transform:uppercase">Music Preview</div><div style="margin-top:8px;font-size:18px;font-weight:700">角色配乐控制台</div><div class="music-bars" style="opacity:'+(state.musicPlaying&&state.currentAudioKey===creature.key?1:.48)+'"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="music-controls"><div class="music-status"><div><b>'+(hasAudio?'已连接角色音乐':'暂未上传音乐')+'</b><span>'+(hasAudio?(state.currentAudioKey===creature.key&&state.musicPlaying?'NOW PLAYING':'READY TO PLAY'):'UPLOAD AUDIO')+'</span></div><div style="font-size:12px;color:#9ba7b1">'+(hasAudio?'可直接播放':'支持 mp3 / wav / m4a')+'</div></div><div class="music-buttons"><button class="accent" data-music-toggle="'+creature.key+'">'+((state.currentAudioKey===creature.key&&state.musicPlaying)?'暂停音乐':'播放音乐')+'</button><button data-audio-upload="'+creature.key+'">上传音乐</button><button data-music-mute="toggle">'+(state.musicMuted?'取消静音':'静音')+'</button>'+(hasAudio?'<button data-audio-clear="'+creature.key+'">清空音乐</button>':'')+'</div><div class="music-slider-row"><label>音量</label><input type="range" min="0" max="100" value="'+Math.round(state.musicVolume*100)+'" data-music-volume="1" /><strong style="font-size:12px;color:#d9e2e8">'+Math.round(state.musicVolume*100)+'</strong></div><div class="music-note">现在首页已经变成真正可控的角色入口了。后面你把六个人物视频和各自参考音乐都补齐，我们就能继续做更完整的片头感切换。</div></div></div></div></div>'}
    function renderArchive(){const focus=archiveCreature();document.getElementById('view-archive').innerHTML='<div class="archive-wrap"><div class="archive-topline"><div class="archive-head"><div><div class="section-title" style="font-size:24px">异兽档案</div><div class="section-sub" style="margin-top:4px">Archive Matrix / Hover To Play</div></div><div class="archive-head-copy">我把这里继续往“资料矩阵系统”推进了一层。上面负责快速扫视六个角色，下面则把当前选中的角色展开成更完整的视觉档案。</div></div><div class="archive-metrics"><div class="archive-metric"><div class="k">Total Units</div><div class="v">06</div></div><div class="archive-metric"><div class="k">Video Linked</div><div class="v">'+CREATURES.filter(isVideo).length.toString().padStart(2,'0')+'</div></div><div class="archive-metric"><div class="k">Audio Linked</div><div class="v">'+CREATURES.filter(c=>hasAudioAsset(c.key)).length.toString().padStart(2,'0')+'</div></div><div class="archive-metric"><div class="k">Focused Unit</div><div class="v">'+focus.id+'</div></div></div></div><div class="archive-row">'+CREATURES.map(creature=>'<div class="archive-column '+(focus.key===creature.key?'active':'')+'" data-archive-focus="'+creature.key+'"><div class="media">'+mediaTag(creature,'muted playsinline loop preload="metadata"')+'</div><div class="glow"></div><div class="content"><div class="index">'+creature.id+'</div><h3>'+creature.name+'</h3><p>'+creature.en+'<br>'+creature.type+'</p><div class="status-line"><span class="archive-status">'+(isVideo(creature)?'HOVER PLAY':'STATIC PREVIEW')+'</span><i></i></div></div></div>').join('')+'</div><div class="archive-detail"><div class="archive-detail-grid"><div><h4>'+focus.name+'</h4><div class="sub">'+focus.en+' / '+focus.code+'</div><div class="desc">'+focus.desc+' 这一版的下半区我改成了“角色展开页”的逻辑：左边是更完整的说明和标签，右边是当前角色的主画面预览。这样浏览时会更像看一个完整系列，而不是六张孤立的卡片。</div><div class="archive-mini-grid"><div class="mini-spec"><div class="k">Origin</div><div class="v">'+focus.origin+'</div></div><div class="mini-spec"><div class="k">Type</div><div class="v">'+focus.type+'</div></div><div class="mini-spec"><div class="k">Danger</div><div class="v">L-'+focus.danger+'</div></div><div class="mini-spec"><div class="k">Media</div><div class="v">'+(isVideo(focus)?'Dynamic':'Static')+'</div></div></div><div class="archive-tag-cloud">'+focus.tags.map(tag=>'<span>'+tag+'</span>').join('')+'</div><div class="archive-action-row"><button class="ghost-btn" data-upload-current="'+focus.key+'">上传该角色视频</button><button class="ghost-btn" data-audio-upload="'+focus.key+'">上传该角色音乐</button><button class="ghost-btn" data-set-home="'+focus.key+'">设为首页角色</button></div></div><div class="archive-side"><div class="archive-hero-preview"><div class="label">Focused Creature</div>'+mediaTag(focus,'muted playsinline loop autoplay preload="metadata"')+'<div class="foot"><div><b>'+focus.name+'</b><span>'+focus.en+'</span></div><div style="text-align:right"><b style="font-size:16px">'+(hasAudioAsset(focus.key)?'AUDIO READY':'AUDIO EMPTY')+'</b><span>'+(isVideo(focus)?'DYNAMIC FEED':'STILL FEED')+'</span></div></div></div><div class="side-box"><div class="k">当前档案状态</div><div class="v">'+(isVideo(focus)?'该角色已经接入动态视频素材，可在矩阵中悬停播放。':'该角色当前仍使用静态图，后续可以继续补视频素材。')+' '+(hasAudioAsset(focus.key)?'同时已经有共享角色音乐，可作为首页配乐。':'当前还没有上传共享角色音乐。')+'</div></div></div></div></div>'}
    function renderGenerate(){document.getElementById('view-generate').innerHTML=heroTemplate(activeCreature(),'generate')}function renderLab(){document.getElementById('view-lab').innerHTML='<div class="hero" style="display:grid;place-items:center;text-align:center"><div><div class="hero-name" style="font-size:36px">实验室模块预留</div><div class="hero-en">LAB READY FOR NEXT STEP</div><div class="hint">这里后面可以继续接角色实验视频、镜头测试、音乐控制和特效开关。</div></div></div>'}function renderFavorites(){document.getElementById('view-favorites').innerHTML='<div class="hero" style="display:grid;place-items:center;text-align:center"><div><div class="hero-name" style="font-size:36px">收藏夹模块预留</div><div class="hero-en">FAVORITES READY FOR NEXT STEP</div><div class="hint">后面我们可以把喜欢的生成结果、视频片段和音乐方案收进这里。</div></div></div>'}
    function renderRightbar(){const hidden=state.tab!=='generate';document.getElementById('rightbar').classList.toggle('hidden',hidden);if(hidden)return;document.getElementById('rightbar').innerHTML='<h2 class="section-title">参数调控</h2><p class="section-sub">Parameter Adjust</p>'+'<div class="block">'+SLIDERS.map(([cn,en,val],i)=>'<div class="slider-row"><label>'+cn+'<div style="font-size:10px;color:#73808b;letter-spacing:.08em;margin-top:2px">'+en+'</div></label><input type="range" min="0" max="100" value="'+val+'" data-slider="'+i+'" /><span>'+val+'</span></div>').join('')+'</div>'+'<div class="block"><div style="font-size:15px;font-weight:700">视觉风格</div><div class="chip-row">'+VISUAL_STYLES.map(v=>'<button class="chip '+(state.styles.has(v)?'active':'')+'" data-style="'+v+'">'+v+'</button>').join('')+'</div></div>'+'<div class="block"><div style="font-size:15px;font-weight:700">光影氛围</div><div class="chip-row">'+LIGHT_STYLES.map(v=>'<button class="chip '+(state.lights.has(v)?'active':'')+'" data-light="'+v+'">'+v+'</button>').join('')+'</div></div>'+'<div class="block"><div style="font-size:15px;font-weight:700">色彩滤镜</div><div class="palette">'+FILTERS.map(v=>'<button class="dot '+(state.filter===v?'active':'')+'" data-filter="'+v+'" style="background:'+v+'"></button>').join('')+'</div><div class="hint" style="margin-top:10px">你以后只需要点“素材接口”上传，不用再进文件夹。首页和档案区也都会自动读取这些视频。</div></div>'}
    function renderBottom(){const hidden=state.tab!=='generate';const bottom=document.getElementById('bottomArea');bottom.classList.toggle('hidden',hidden);if(hidden)return;const creature=activeCreature();bottom.innerHTML='<div class="panel"><div class="section-title" style="font-size:18px">镜头设置</div><div class="section-sub">Camera Settings</div><div class="camera-list">'+['镜头距离 / CLOSE-UP','镜头角度 / FRONT VIEW','镜头运动 / SLOW PUSH IN','景深效果 / SHALLOW DOF'].map((v,i)=>'<div class="camera-item '+(i===0?'active':'')+'">'+v+'</div>').join('')+'</div></div>'+'<div class="panel"><div class="section-title" style="font-size:18px">生成预览</div><div class="section-sub">Generate Preview</div><div class="preview-strip">'+CREATURES.map(c=>'<div class="preview-card '+(c.key===creature.key?'active':'')+'" data-creature="'+c.key+'">'+mediaTag(c,'muted playsinline preload="metadata"')+'</div>').join('')+'</div></div>'+'<div class="panel"><div class="section-title" style="font-size:18px">生成控制</div><div class="section-sub">Generation Control</div><div class="controls"><div class="btn-row"><button class="ghost-btn" id="resetBtn">重置参数</button><button class="ghost-btn" id="randomBtn">随机生成</button></div><button class="primary-btn" id="scanBtn">生成视觉档案</button><button class="ghost-btn" data-upload-current="'+creature.key+'">为当前人物接入视频</button></div></div>'+'<div class="panel"><div style="display:flex;justify-content:space-between;align-items:end"><div><div class="section-title" style="font-size:18px">生成记录</div><div class="section-sub">Generation History</div></div><div class="hint">最近三条</div></div><div class="history-list">'+[0,1,2].map(i=>'<div class="history-item"><div class="mini">'+mediaTag(CREATURES[i],'muted playsinline preload="metadata"')+'</div><div><div style="font-size:13px;font-weight:700">'+CREATURES[i].code+'</div><div style="font-size:12px;color:#cbd4da">'+CREATURES[i].name+' · '+CREATURES[i].type+'</div><div class="time">'+timeString(i*910000)+'</div></div></div>').join('')+'</div></div>'}
    function renderAssetModal(){const cloudUpdated=(state.cloudAssets.meta&&state.cloudAssets.meta.updatedAt)||'未配置';document.getElementById('assetGrid').innerHTML='<div class="upload-card" style="grid-column:1/-1"><div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap"><div><div style="font-size:18px;font-weight:700">共享素材模式已开启</div><div class="hint">网站上线后，会优先读取 /data/assets.json 里的共享视频与音乐，所以朋友打开同一个网址也能看到同样素材。</div></div><div class="hint">最近更新：'+cloudUpdated+'</div></div></div>'+CREATURES.map(creature=>'<div class="upload-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-size:18px;font-weight:700">'+creature.id+' '+creature.name+'</div><div style="font-size:11px;color:#7e8b96;letter-spacing:.16em">'+creature.en+'</div></div><div class="hint">'+(cloudVideoUrl(creature.key)?'共享视频已接入':(isVideo(creature)?'本地视频预览':'当前使用静态图'))+'</div></div><div class="upload-preview">'+mediaTag(creature,'muted playsinline loop autoplay preload="metadata"')+'</div><div class="upload-actions"><button data-upload="'+creature.key+'">上传本地视频预览</button><button class="set-home" data-set-home="'+creature.key+'">设为首页角色</button><button class="danger" data-clear="'+creature.key+'">清空本地预览</button></div><div class="asset-audio"><div class="title">Audio Track</div><div class="row"><b>'+(hasAudioAsset(creature.key)?'已接入角色音乐':'暂未上传音乐')+'</b><span>'+audioModeLabel(creature.key)+'</span></div><div class="upload-actions"><button data-audio-upload="'+creature.key+'">上传本地音乐预览</button><button class="set-home" data-music-toggle="'+creature.key+'">'+(state.currentAudioKey===creature.key&&state.musicPlaying?'暂停播放':'播放试听')+'</button>'+(state.audioUrls[creature.key]?'<button class="danger" data-audio-clear="'+creature.key+'">清空本地音乐</button>':'')+'</div><div class="hint" style="margin-top:10px">共享发布请编辑 data/assets.json，并把对应文件放进 assets/shared/videos 与 assets/shared/audios。</div></div></div>').join('')}
    function showTab(key){state.tab=key;['home','archive','generate','lab','favorites'].forEach(v=>document.getElementById('view-'+v).classList.toggle('active',v===key));render();bindVideoHover();syncAudio()}function render(){renderNav();renderCreatureList();renderHome();renderArchive();renderGenerate();renderLab();renderFavorites();renderRightbar();renderBottom();renderAssetModal();bindVideoHover()}function bindVideoHover(){document.querySelectorAll('.archive-column, .home-tile').forEach(card=>{const video=card.querySelector('video');if(!video)return;card.onmouseenter=()=>{video.currentTime=0;video.play().catch(()=>{})};card.onmouseleave=()=>{video.pause();video.currentTime=0}})}function openModal(){document.getElementById('assetModal').classList.add('show')}function closeModal(){document.getElementById('assetModal').classList.remove('show')}function getAudioEl(){return document.getElementById('globalAudio')}function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open('shjx-asset-db',2);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains('videos'))db.createObjectStore('videos',{keyPath:'key'});if(!db.objectStoreNames.contains('audios'))db.createObjectStore('audios',{keyPath:'key'})};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}async function saveVideo(key,file){const db=await openDB();await new Promise((resolve,reject)=>{const tx=db.transaction('videos','readwrite');tx.objectStore('videos').put({key,blob:file,name:file.name,type:file.type,updatedAt:Date.now()});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)});db.close()}async function removeVideo(key){const db=await openDB();await new Promise((resolve,reject)=>{const tx=db.transaction('videos','readwrite');tx.objectStore('videos').delete(key);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)});db.close()}async function saveAudio(key,file){const db=await openDB();await new Promise((resolve,reject)=>{const tx=db.transaction('audios','readwrite');tx.objectStore('audios').put({key,blob:file,name:file.name,type:file.type,updatedAt:Date.now()});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)});db.close()}async function removeAudio(key){const db=await openDB();await new Promise((resolve,reject)=>{const tx=db.transaction('audios','readwrite');tx.objectStore('audios').delete(key);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)});db.close()}async function loadVideos(){const db=await openDB();const all=await new Promise((resolve,reject)=>{const tx=db.transaction('videos','readonly');const req=tx.objectStore('videos').getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)});db.close();Object.values(state.objectUrls).forEach(url=>URL.revokeObjectURL(url));state.objectUrls={};all.forEach(item=>{if(item.blob)state.objectUrls[item.key]=URL.createObjectURL(item.blob)})}async function loadAudios(){const db=await openDB();const all=await new Promise((resolve,reject)=>{const tx=db.transaction('audios','readonly');const req=tx.objectStore('audios').getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)});db.close();Object.values(state.audioUrls).forEach(url=>URL.revokeObjectURL(url));state.audioUrls={};all.forEach(item=>{if(item.blob)state.audioUrls[item.key]=URL.createObjectURL(item.blob)})}async function loadCloudAssets(){try{const res=await fetch('./data/assets.json',{cache:'no-store'});if(!res.ok)throw new Error('assets.json not found');const json=await res.json();state.cloudAssets={videos:json.videos||{},audios:json.audios||{},meta:json.meta||{}}}catch(err){state.cloudAssets={videos:{},audios:{},meta:{error:String(err)}}}}function desiredAudioKey(){if(state.tab!=='home')return null;return state.homeKey}function resolvedAudioUrl(key){return cloudAudioUrl(key)||state.audioUrls[key]||''}function syncAudio(){const audio=getAudioEl();if(!audio)return;audio.volume=state.musicMuted?0:state.musicVolume;const key=desiredAudioKey();const resolved=resolvedAudioUrl(key);if(!key||!resolved){audio.pause();audio.removeAttribute('src');audio.load();state.musicPlaying=false;state.currentAudioKey=null;return}if(state.currentAudioKey!==key||audio.getAttribute('src')!==resolved){const wasPlaying=state.musicPlaying&&!audio.paused;audio.src=resolved;audio.loop=true;state.currentAudioKey=key;state.musicPlaying=false;if(wasPlaying){audio.play().then(()=>{state.musicPlaying=true;render()}).catch(()=>{})}}}function setHomeKey(key){state.homeKey=key;localStorage.setItem('shjx-home-key',key)}function stopAudioSource(){const audio=getAudioEl();if(!audio)return;audio.pause();audio.removeAttribute('src');audio.load();state.musicPlaying=false;state.currentAudioKey=null}function toggleMusicFor(key){setHomeKey(key);if(state.tab!=='home'){showTab('home')}const audio=getAudioEl();const src=resolvedAudioUrl(key);if(!src){render();return}if(state.currentAudioKey===key&&state.musicPlaying&&!audio.paused){audio.pause();state.musicPlaying=false;render();return}if(state.currentAudioKey!==key||audio.getAttribute('src')!==src){audio.src=src;audio.loop=true;state.currentAudioKey=key}audio.volume=state.musicMuted?0:state.musicVolume;audio.play().then(()=>{state.musicPlaying=true;render()}).catch(()=>{})}async function chooseVideoFor(key){state.assetKey=key;const input=document.getElementById('videoPicker');input.value='';input.click()}async function chooseAudioFor(key){state.audioKey=key;const input=document.getElementById('audioPicker');input.value='';input.click()}document.getElementById('videoPicker').addEventListener('change',async e=>{const file=e.target.files&&e.target.files[0];if(!file||!state.assetKey)return;await saveVideo(state.assetKey,file);await loadVideos();render()});document.getElementById('audioPicker').addEventListener('change',async e=>{const file=e.target.files&&e.target.files[0];if(!file||!state.audioKey)return;await saveAudio(state.audioKey,file);await loadAudios();if(state.tab==='home'&&state.homeKey===state.audioKey)syncAudio();render()});document.getElementById('globalAudio').addEventListener('play',()=>{state.musicPlaying=true;render()});document.getElementById('globalAudio').addEventListener('pause',()=>{state.musicPlaying=false;render()});
    document.addEventListener('click',async e=>{const nav=e.target.closest('[data-nav]');if(nav)return showTab(nav.dataset.nav);const navForce=e.target.closest('[data-nav-force]');if(navForce)return showTab(navForce.dataset.navForce);const creature=e.target.closest('[data-creature]');if(creature){state.activeKey=creature.dataset.creature;state.archiveFocus=creature.dataset.creature;render();return}const homeTile=e.target.closest('[data-home-tile]');if(homeTile){setHomeKey(homeTile.dataset.homeTile);render();syncAudio();return}const archiveFocus=e.target.closest('[data-archive-focus]');if(archiveFocus){state.archiveFocus=archiveFocus.dataset.archiveFocus;state.activeKey=archiveFocus.dataset.archiveFocus;render();return}const upload=e.target.closest('[data-upload]');if(upload)return chooseVideoFor(upload.dataset.upload);const uploadCurrent=e.target.closest('[data-upload-current]');if(uploadCurrent)return chooseVideoFor(uploadCurrent.dataset.uploadCurrent);const audioUpload=e.target.closest('[data-audio-upload]');if(audioUpload)return chooseAudioFor(audioUpload.dataset.audioUpload);const setHome=e.target.closest('[data-set-home]');if(setHome){setHomeKey(setHome.dataset.setHome);render();syncAudio();return}const clear=e.target.closest('[data-clear]');if(clear){await removeVideo(clear.dataset.clear);await loadVideos();render();return}const audioClear=e.target.closest('[data-audio-clear]');if(audioClear){await removeAudio(audioClear.dataset.audioClear);await loadAudios();if(state.currentAudioKey===audioClear.dataset.audioClear)stopAudioSource();render();return}const musicToggle=e.target.closest('[data-music-toggle]');if(musicToggle){toggleMusicFor(musicToggle.dataset.musicToggle);return}const musicMute=e.target.closest('[data-music-mute]');if(musicMute){state.musicMuted=!state.musicMuted;localStorage.setItem('shjx-music-muted',state.musicMuted?'1':'0');syncAudio();render();return}const style=e.target.closest('[data-style]');if(style){const k=style.dataset.style;state.styles.has(k)?state.styles.delete(k):state.styles.add(k);renderRightbar();return}const light=e.target.closest('[data-light]');if(light){const k=light.dataset.light;state.lights.has(k)?state.lights.delete(k):state.lights.add(k);renderRightbar();return}const filter=e.target.closest('[data-filter]');if(filter){state.filter=filter.dataset.filter;renderRightbar();return}if(e.target.id==='openAssetHub')return openModal();if(e.target.id==='closeAssetHub'||e.target.id==='assetModal')return closeModal();if(e.target.id==='scanBtn'){state.scan=true;renderGenerate();setTimeout(()=>{state.scan=false;renderGenerate()},2200);return}if(e.target.id==='randomBtn'){const chosen=CREATURES[Math.floor(Math.random()*CREATURES.length)].key;state.activeKey=chosen;state.archiveFocus=chosen;render();return}if(e.target.id==='resetBtn'){state.styles=new Set(['暗黑科幻']);state.lights=new Set(['冷光']);state.filter='#e6453a';render()}});
    document.addEventListener('input',e=>{if(e.target.matches('[data-slider]')){e.target.nextElementSibling.textContent=e.target.value}if(e.target.matches('[data-music-volume]')){state.musicVolume=Number(e.target.value)/100;localStorage.setItem('shjx-music-volume',String(state.musicVolume));syncAudio();const label=e.target.parentElement.querySelector('strong');if(label)label.textContent=e.target.value;}});
    (async function init(){try{await Promise.all([loadCloudAssets(),loadVideos(),loadAudios()])}catch(err){console.error(err)}render();showTab(state.tab)})();
  </script>
